# Nginx Configuration for EcoRoute Optimizer API Gateway

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # Upstream services
    upstream freight_service {
        server freight-service:8001;
    }

    upstream optimizer_service {
        server optimizer-service:8002;
    }

    upstream pricing_service {
        server pricing-service:8003;
    }

    upstream demand_service {
        server demand-service:8004;
    }

    upstream carbon_service {
        server carbon-service:8005;
    }

    upstream empty_miles_service {
        server empty-miles-service:8006;
    }

    upstream digital_twin_service {
        server digital-twin-service:8007;
    }

    upstream weather_service {
        server weather-service:8008;
    }

    upstream copilot_service {
        server copilot-service:8009;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check
        location /health {
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # Freight Marketplace API
        location /api/marketplace/ {
            proxy_pass http://freight_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Optimizer API
        location /api/optimize/ {
            proxy_pass http://optimizer_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            proxy_connect_timeout 75;
        }

        # Pricing AI API
        location /api/pricing/ {
            proxy_pass http://pricing_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Demand Prediction API
        location /api/demand/ {
            proxy_pass http://demand_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Carbon Intelligence API
        location /api/carbon/ {
            proxy_pass http://carbon_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Empty Miles Detection API
        location /api/empty-miles/ {
            proxy_pass http://empty_miles_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Digital Twin API
        location /api/digital-twin/ {
            proxy_pass http://digital_twin_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300;
        }

        # Weather API
        location /api/weather/ {
            proxy_pass http://weather_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Copilot API
        location /api/copilot/ {
            proxy_pass http://copilot_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120;
        }

        # Default API (legacy - backward compatibility)
        location /api/ {
            proxy_pass http://freight_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}

